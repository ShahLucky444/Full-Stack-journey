    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>navbar amazon</title>
        <style>
            #navbar{
                background-color:#0f1111;
                height: 60px;
            }
            *{
                color: aliceblue;
            }

            button{
                background-color: rgb(226, 152, 62);
            }
            #ama{
                font-size: 25px;
                color:orange;
            }
            a{
                margin-right: 200px;
                text-decoration: none;
            }
        </style>

    </head>
    <body>
        <div id="navbar">
            <a id="ama" href="#">amazon.in</a>
            <a href="#">account</a>
            <a href="#">cart</a>
            <a href="#">contact us</a>
            <input type="search" placeholder="search product">
            <button>search</button>
    
        </div>

    </body>
    </html>
