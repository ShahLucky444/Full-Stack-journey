<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Loader</title>
    <style>
        div{
        height:200px;
        width: 200px;
        border-radius: 50%;
        border:40px solid grey;
        border-top: 40px solid rgb(41, 196, 231);
        animation: Loading 3s linear 0s infinite normal;
       }
    @keyframes Loading{
        from{
            transform:rotate(0deg);
        }
        to{
            transform:rotate(360deg);
        }
    }
    </style>
</head>
<body align="center">
    <h1>Page Loading Animation</h1>
    <div>

    </div>
</body>
</html>
